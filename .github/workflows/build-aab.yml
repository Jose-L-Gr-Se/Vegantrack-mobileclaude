name: Build AAB (Play Store)

on:
  workflow_dispatch:

jobs:
  build-aab:
    name: Build signed AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build signed AAB (EAS local — uses keystore from EAS credentials)
        run: npx eas-cli build --platform android --profile production --local --non-interactive --output ./vegantrack-release.aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: goog_UoQHdmLHLVHPmKEHtNEyHBQPBXa
          EXPO_PUBLIC_WEB_BASE_URL: https://vegantrack.app

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: vegantrack-release-aab
          path: ./vegantrack-release.aab
          retention-days: 30
