name: Build AAB (Play Store)

# Sólo manual: lo lanzas desde Actions cuando quieras subir una versión a Play Store.
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Versión visible (ej. 1.0.1). Deja vacío para usar la de package.json.'
        required: false
        default: ''

jobs:
  build-aab:
    name: Build signed AAB for Google Play
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # versionCode = run_number (único, siempre creciente, nunca hay que tocarlo a mano)
      # versionName = lo que pases en el input, o la versión de package.json
      - name: Bump versionCode in app.json
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME=$(node -p "require('./package.json').version")
          fi
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.android.versionCode = ${VERSION_CODE};
            app.expo.version = '${VERSION_NAME}';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('versionCode=' + ${VERSION_CODE} + '  versionName=${VERSION_NAME}');
          "
          echo "### Build info" >> $GITHUB_STEP_SUMMARY
          echo "- **versionCode**: ${VERSION_CODE}" >> $GITHUB_STEP_SUMMARY
          echo "- **versionName**: ${VERSION_NAME}" >> $GITHUB_STEP_SUMMARY

      - name: Generate native Android project
        run: npm run prebuild:android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: goog_UoQHdmLHLVHPmKEHtNEyHBQPBXa
          EXPO_PUBLIC_WEB_BASE_URL: https://vegantrack.app

      - name: Setup release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/vegantrack-release.jks
          node scripts/setup-signing.js
        env:
          ANDROID_KEYSTORE_PATH: vegantrack-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: vegantrack
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release AAB
        run: npm run build:aab
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: goog_UoQHdmLHLVHPmKEHtNEyHBQPBXa
          EXPO_PUBLIC_WEB_BASE_URL: https://vegantrack.app
          ANDROID_KEYSTORE_PATH: vegantrack-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: vegantrack
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: vegantrack-release-aab-v${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90
