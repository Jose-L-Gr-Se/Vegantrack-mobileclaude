name: Build AAB (Play Store)

on:
  workflow_dispatch:

jobs:
  build-aab:
    name: Build signed AAB
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Bump versionCode in app.json
        run: |
          current=$(node -p "require('./app.json').expo.android.versionCode")
          next=$((current + 1))
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json','utf8'));
            cfg.expo.android.versionCode = $next;
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app.json
          git commit -m "chore: bump versionCode to $next [skip ci]"
          git push

      - name: Install dependencies
        run: npm ci

      - name: Build signed AAB (EAS local — uses keystore from EAS credentials)
        run: npx eas-cli build --platform android --profile production --local --non-interactive --output ./vegantrack-release.aab
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: goog_UoQHdmLHLVHPmKEHtNEyHBQPBXa
          EXPO_PUBLIC_WEB_BASE_URL: https://vegantrack.app

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: vegantrack-release-aab
          path: ./vegantrack-release.aab
          retention-days: 30
