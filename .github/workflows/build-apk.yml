name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - claude/happy-heisenberg-ya19i8

jobs:
  build-android:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Bump versionCode
        run: |
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.android.versionCode = ${{ github.run_number }};
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('versionCode=${{ github.run_number }}');
          "

      - name: Generate native Android project
        run: npm run prebuild:android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          # Clave pública de RevenueCat (goog_...): se incrusta en el cliente, no es secreta.
          EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: goog_UoQHdmLHLVHPmKEHtNEyHBQPBXa
          EXPO_PUBLIC_WEB_BASE_URL: https://vegantrack.app

      - name: Build release APK
        run: npm run build:apk
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: goog_UoQHdmLHLVHPmKEHtNEyHBQPBXa
          EXPO_PUBLIC_WEB_BASE_URL: https://vegantrack.app

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vegantrack-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
