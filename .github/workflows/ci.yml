name: CI

on:
  push:
    branches:
      - main
      - claude/happy-heisenberg-ya19i8
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Typecheck & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & integration tests
        run: npm test -- --ci
